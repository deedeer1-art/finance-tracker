{% extends "expenses/base.html" %}
{% block title %}Categories{% endblock %}
{% block content %}
<div class="flex justify-between items-center mb-6">
  <h1 class="text-2xl font-bold">Categories</h1>
  <a href="{% url 'category-add' %}" class="btn btn-primary">+ Add Category</a>
</div>
{% if categories %}
<div class="grid grid-cols-2 md:grid-cols-4 gap-4">
  {% for cat in categories %}
  <div class="card bg-base-100 shadow">
    <div class="card-body py-4">
      <h3 class="font-bold">{{ cat.name }}</h3>
      <p class="text-xs opacity-60">{{ cat.icon }}</p>
      <div class="flex gap-2 mt-2">
        <a href="{% url 'category-edit' cat.pk %}" class="btn btn-xs btn-ghost">Edit</a>
        <a href="{% url 'category-delete' cat.pk %}" class="btn btn-xs btn-error btn-ghost">Delete</a>
      </div>
    </div>
  </div>
  {% endfor %}
</div>
{% else %}
<div class="card bg-base-100 shadow p-8 text-center opacity-60">No categories yet.</div>
{% endif %}
{% endblock %}
