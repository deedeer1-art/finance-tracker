{% extends "expenses/base.html" %}
{% block title %}Confirm Delete{% endblock %}
{% block content %}
<div class="max-w-md mx-auto">
  <div class="card bg-base-100 shadow">
    <div class="card-body text-center">
      <h2 class="card-title justify-center text-error mb-4">⚠ Confirm Delete</h2>
      <p class="mb-6">Are you sure you want to delete <strong>{{ object }}</strong>? This action cannot be undone.</p>
      <form method="post" class="flex gap-3 justify-center">
        {% csrf_token %}
        <button type="submit" class="btn btn-error">Yes, delete</button>
        <a href="javascript:history.back()" class="btn btn-ghost">Cancel</a>
      </form>
    </div>
  </div>
</div>
{% endblock %}
